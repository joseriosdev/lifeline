<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<link rel="icon" href="https://www.pngfind.com/pngs/m/5-58825_telephone-phone-icon-phone-symbol-png-yellow-transparent.png" sizes="32x32">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Turnos de Llamada</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="./css_js/css_lifeline.css">

    <!--Open Graph (Facebook / LinkedIn / Discord)-->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joseriosdev.github.io/lifeline/">
    <meta property="og:title" content="Simulador de Turnos de Llamada">
    <meta property="og:description" content="Acuérdense de aquellos que están en prisión, como si ustedes mismos estuvieran allí. Acuérdense también de los que son maltratados, como si ustedes mismos sintieran en carne propia el dolor de ellos. Hebreos 13:3">
    <meta property="og:image" content="https://images.zoogletools.com/s:bzglfiles/u/395577/911ff59461d09c3c860d354e49e534183e1aa837/original/porque-por-fe-andamos-no-por-vista.png/!!/meta%3AeyJzcmNCdWNrZXQiOiJiemdsZmlsZXMifQ%3D%3D.png">
    <!--Twitter/X-->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://joseriosdev.github.io/lifeline/">
    <meta name="twitter:title" content="Simulador de Turnos de Llamada">
    <meta name="twitter:description" content="Acuérdense de aquellos que están en prisión, como si ustedes mismos estuvieran allí. Acuérdense también de los que son maltratados, como si ustedes mismos sintieran en carne propia el dolor de ellos. Hebreos 13:3">
    <meta name="twitter:image" content="https://images.zoogletools.com/s:bzglfiles/u/395577/911ff59461d09c3c860d354e49e534183e1aa837/original/porque-por-fe-andamos-no-por-vista.png/!!/meta%3AeyJzcmNCdWNrZXQiOiJiemdsZmlsZXMifQ%3D%3D.png">
</head>
<body>

    <div class="container mx-auto max-w-2xl py-8 px-4">
        <h1 class="text-4xl font-bold text-center mb-10 text-white">
            ⏰ Simulador de Ciclo de Llamada
        </h1>

        <!-- Selected Output -->
        <div class="bg-blue-900/30 p-6 rounded-xl text-white text-center shadow-lg mb-8">
            <h2 class="text-2xl font-semibold mb-2 text-blue-300">Turno de Llamada Seleccionado:</h2>
            <p id="selected-output" class="text-4xl font-extrabold"></p>
        </div>

        <!-- Roulette Section -->
        <div class="flex space-x-4 mb-10 bg-[#0d1117] p-4 rounded-xl shadow-2xl relative">
            
            <!-- Focus Indicator Line (as background highlight) <div class="focus-line"></div> -->
            
            <!-- Day Roulette -->
            <div id="day-roulette-container" class="roller-container w-1/2">
                <div id="day-roller" class="roller">
                    <!-- Day Items Injected Here -->
                </div>
            </div>

            <!-- Hour Roulette -->
            <div id="hour-roulette-container" class="roller-container w-1/2">
                <div id="hour-roller" class="roller">
                    <!-- Hour Items Injected Here -->
                </div>
            </div>
        </div>

        <!-- Current Date and Time -->
        <div class="text-center text-gray-400">
            <p class="text-xl font-medium">Fecha y Hora Actual (local):</p>
            <p id="current-datetime" class="text-3xl font-mono mt-1"></p>
        </div>
		
		<footer>
			<p>Revisa cuántas semanas llevas viviendo haciendo <a href="./life-in-perspective.html">click aquí.</a></p>
		</footer>
    </div>
    <script src="./css_js/js_lifeline.js"></script>
</body>
</html>
